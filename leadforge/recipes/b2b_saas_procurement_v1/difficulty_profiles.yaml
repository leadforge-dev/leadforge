# Difficulty profiles for b2b_saas_procurement_v1
# ---------------------------------------------------------------------------
# Each profile controls the signal/noise characteristics of the generated
# dataset. Higher difficulty = more realistic noise, missing data, and class
# imbalance, making the supervised task harder.

intro:
  description: >
    Clean signal, minimal noise. Suitable for learning basic ML concepts
    and verifying that a pipeline runs end to end.
  # Probability that the true mechanism drives the outcome (vs. noise)
  signal_strength: 0.90
  # Scale multiplier applied to additive Gaussian noise in continuous features
  noise_scale: 0.10
  # Fraction of feature values set to missing (NaN)
  missing_rate: 0.02
  # Fraction of rows that are statistical outliers
  outlier_rate: 0.01
  # Positive-class rate for converted_within_90_days
  conversion_rate_range: [0.30, 0.45]
  # Strength of buying-committee-friction effects
  committee_friction: 0.10
  # Correlate observable categories with latent traits to produce category-level
  # conversion signal.  Each entry maps an observable field to a latent trait and
  # per-value additive boosts (applied after initial latent sampling in
  # build_population).  Values validated by spike experiment (scale 1.8).
  category_latent_correlations:
    seniority:
      latent_trait: latent_contact_authority
      boosts:
        individual_contributor: -0.27
        manager: -0.09
        director: 0.09
        vp: 0.22
        c_suite: 0.36
    estimated_revenue_band:
      latent_trait: latent_account_fit
      boosts:
        "$1M-$10M": -0.18
        "$10M-$50M": 0.0
        "$50M-$200M": 0.18
        "$200M+": 0.32
    lead_source:
      latent_trait: latent_engagement_propensity
      boosts:
        sdr_outbound: -0.14
        inbound_marketing: 0.09
        partner_referral: 0.22

intermediate:
  description: >
    Realistic signal-to-noise ratio. Suitable for portfolio projects,
    courses, and kaggle-style competitions.
  signal_strength: 0.70
  noise_scale: 0.30
  missing_rate: 0.08
  outlier_rate: 0.04
  conversion_rate_range: [0.18, 0.28]
  committee_friction: 0.30

advanced:
  description: >
    High noise, realistic class imbalance, and significant missing data.
    Suitable for ML research and realistic benchmark construction.
  signal_strength: 0.50
  noise_scale: 0.55
  missing_rate: 0.18
  outlier_rate: 0.08
  conversion_rate_range: [0.08, 0.15]
  committee_friction: 0.55
