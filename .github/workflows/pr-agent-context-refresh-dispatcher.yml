name: PR agent context refresh dispatcher

# Runs on a schedule and dispatches pr-agent-context-refresh for any open
# same-repo PR that had recent review activity but no corresponding in-flight
# or recently-completed refresh run.
#
# This is the approval-gated fallback: when a bot (e.g. Copilot) submits a
# review, the pull_request_review event may trigger a run that is held for
# approval, or may be skipped entirely in certain org configurations.  This
# dispatcher ensures those PRs are not left stale indefinitely.

on:
  schedule:
    # Every 15 minutes during business hours (UTC).
    # Adjust or extend to '*/15 * * * *' if 24/7 coverage is needed.
    - cron: '*/15 7-23 * * 1-5'

permissions:
  actions: write
  pull-requests: read

jobs:
  dispatch:
    name: Dispatch stalled PR agent context refreshes
    runs-on: ubuntu-latest
    steps:
      - name: Find and dispatch pending refreshes
        uses: actions/github-script@v7
        with:
          script: |
            const REFRESH_WORKFLOW = 'pr-agent-context-refresh.yml';
            // Only look at activity in the last N minutes to avoid spurious dispatches.
            const LOOKBACK_MINUTES = 20;
            // Skip dispatch if a run completed within the last N minutes.
            const RECENT_COMPLETED_WINDOW_MINUTES = 10;

            const now = Date.now();
            const since = new Date(now - LOOKBACK_MINUTES * 60 * 1000).toISOString();
            const recentCompletedSince = new Date(
              now - RECENT_COMPLETED_WINDOW_MINUTES * 60 * 1000
            ).toISOString();

            const defaultBranch = context.payload.repository.default_branch;

            // List open PRs in this repository (same-repo only).
            const { data: pulls } = await github.rest.pulls.list({
              ...context.repo,
              state: 'open',
              per_page: 50,
            });

            for (const pr of pulls) {
              // Same-repo guard: skip forks.
              if (pr.head.repo.full_name !== context.payload.repository.full_name) {
                continue;
              }

              try {
                // --- Bounded recent activity check ---
                const [{ data: reviews }, { data: reviewComments }] = await Promise.all([
                  github.rest.pulls.listReviews({
                    ...context.repo,
                    pull_number: pr.number,
                    per_page: 10,
                  }),
                  github.rest.pulls.listReviewComments({
                    ...context.repo,
                    pull_number: pr.number,
                    per_page: 10,
                  }),
                ]);

                const hasRecentActivity =
                  reviews.some((r) => r.submitted_at >= since) ||
                  reviewComments.some(
                    (c) => c.created_at >= since || c.updated_at >= since
                  );

                if (!hasRecentActivity) continue;

                // --- In-flight / recent-completion dedupe ---
                const { data: { workflow_runs: runs } } =
                  await github.rest.actions.listWorkflowRuns({
                    ...context.repo,
                    workflow_id: REFRESH_WORKFLOW,
                    head_sha: pr.head.sha,
                    per_page: 10,
                  });

                const isRunningOrRecent = runs.some(
                  (r) =>
                    r.status === 'in_progress' ||
                    r.status === 'queued' ||
                    r.status === 'waiting' ||
                    (r.status === 'completed' && r.updated_at >= recentCompletedSince)
                );

                if (isRunningOrRecent) {
                  console.log(
                    `PR #${pr.number}: refresh already running or recently completed — skipping.`
                  );
                  continue;
                }

                // --- Dispatch ---
                await github.rest.actions.createWorkflowDispatch({
                  ...context.repo,
                  workflow_id: REFRESH_WORKFLOW,
                  ref: defaultBranch,
                  inputs: {
                    pull_request_number: String(pr.number),
                    pull_request_head_sha: pr.head.sha,
                    pull_request_base_sha: pr.base.sha,
                  },
                });

                console.log(
                  `Dispatched refresh for PR #${pr.number} (head: ${pr.head.sha}).`
                );
              } catch (err) {
                // Per-PR error isolation: log and continue to the next PR.
                console.error(`PR #${pr.number}: dispatch failed — ${err.message}`);
              }
            }
